<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        /* CSS Combined */
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 8px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>To-Do List</h1>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Add a new task...">
            <button id="addBtn">Add</button>
        </div>
        <ul id="todoList"></ul>
    </div>

    <script>
        // JavaScript Combined
        const input = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');

        addBtn.addEventListener('click', () => {
            const taskText = input.value;
            if (taskText === '') return;

            const li = document.createElement('li');
            li.innerHTML = `${taskText} <button class="delete-btn">Delete</button>`;
            
            li.querySelector('.delete-btn').addEventListener('click', function() {
                li.remove();
            });

            todoList.appendChild(li);
            input.value = '';
        });
    </script>
</body>
</html>
