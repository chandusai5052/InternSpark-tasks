<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API User Fetcher</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; }
        .user-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>User Directory</h2>
    <input type="text" id="searchInput" placeholder="Search by name...">
    <div id="status">Loading...</div>
    <div id="userList"></div>

    <script>
        const userListDiv = document.getElementById('userList');
        const statusDiv = document.getElementById('status');
        const searchInput = document.getElementById('searchInput');
        let users = [];

        // Fetch data using Fetch API
        async function fetchUsers() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                if (!response.ok) throw new Error("Failed to fetch data");
                users = await response.json();
                statusDiv.style.display = 'none';
                renderUsers(users);
            } catch (error) {
                statusDiv.innerText = "Error: " + error.message;
            }
        }

        function renderUsers(data) {
            userListDiv.innerHTML = data.map(user => `
                <div class="user-card">
                    <strong>${user.name}</strong><br>${user.email}
                </div>
            `).join('');
        }

        // Search feature
        searchInput.addEventListener('input', (e) => {
            const filtered = users.filter(user => 
                user.name.toLowerCase().includes(e.target.value.toLowerCase())
            );
            renderUsers(filtered);
        });

        fetchUsers();
    </script>
</body>
</html>
